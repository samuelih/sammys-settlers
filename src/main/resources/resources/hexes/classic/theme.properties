# JSettlers hex graphics-set theme: classic
#
# See ../pastel/theme.properties for the full file-format and key documentation.
# ASCII only. Each color value is 6 hex digits RRGGBB (no leading '#').
# Any omitted key falls back to the compiled-in default for this set.
#
# The original hardcoded code shared one hex-border and dice-circle color table
# across both graphics sets; only the water-border and pirate-path colors were
# per-set. So this classic theme overrides just those two set-specific colors and
# inherits the shared border/dice defaults. The border.* and dice.circle.* keys
# are listed (commented out) for reference; uncomment to give classic its own.

# Per-set colors (these differ from pastel):
border.water = 263C71
piri.path = 668AE7

# Shared defaults (same as pastel); uncomment to customize for classic only:
#border.clay = 4E1000
#border.ore = 3A3B39
#border.sheep = 147100
#border.wheat = 8E6D00
#border.wood = 09360D
#border.desert = CBB449
#border.rotat.clay = 782400
#border.rotat.wood = 09360B
#dice.circle.0 = FFFF00
#dice.circle.1 = FFBD00
