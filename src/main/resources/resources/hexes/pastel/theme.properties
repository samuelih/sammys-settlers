# JSettlers hex graphics-set theme: pastel
#
# This file externalizes the per-graphics-set color tables that were previously
# hardcoded in soc.client.SOCBoardPanel. It is loaded once when this graphics
# set's images are loaded (see SOCBoardPanel.loadThemeColors). Any key omitted
# here falls back to the compiled-in default for this set, so a missing or
# partial file is harmless.
#
# FILE FORMAT
#   Standard Java .properties (java.util.Properties), key=value, one per line.
#   '#' or '!' begins a comment line. ASCII only.
#
# COLOR VALUES
#   Each color is 6 hex digits RRGGBB (case-insensitive), like an HTML color.
#   A leading '#' is NOT used for the value (it would start a comment); just the
#   6 digits. Example:  border.clay = 4E1000
#   An empty value or the literal "none" means "no color" (e.g. no border drawn).
#
# KEYS (all optional)
#   border.<type>          Hex border color, un-rotated boards.
#   border.rotat.<type>    Hex border color, 6-player rotated boards.
#       <type> is one of: clay ore sheep wheat wood desert gold fog
#       (gold and water are normally borderless / handled separately).
#   border.water           Water-hex border color (varies by set;
#                          derived from this set's waterHex.gif average color).
#   piri.path              Pirate-path dotted-line color for scenario _SC_PIRI.
#                          If omitted, defaults to a shade derived from the water
#                          color (darker for pastel, brighter for classic).
#   dice.circle.<n>        Dice-number circle fill color, n = 0..4 by rarity:
#       0 = 2/12 (rarest), 1 = 3/11, 2 = 4/10, 3 = 5/9, 4 = 6/8 (most common).
#
# The values below match the historical pastel defaults exactly, so the visual
# output is unchanged; they are listed here as documentation and as the editable
# theme. To tweak the pastel look, change a value and rebuild resources.

border.clay = 4E1000
border.ore = 3A3B39
border.sheep = 147100
border.wheat = 8E6D00
border.wood = 09360D
border.desert = CBB449

border.rotat.clay = 782400
border.rotat.wood = 09360B

border.water = 508AB5

piri.path = 324371

dice.circle.0 = FFFF00
dice.circle.1 = FFBD00
dice.circle.2 = FF7D00
dice.circle.3 = FF5400
dice.circle.4 = FF0000
